<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="config.js"></script>
  <script src="theme.js"></script>
  <title>Attendance — VBS 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f11;
      --surface: #16181c;
      --surface-2: #1e2128;
      --border: #2a2d35;
      --accent: #6c63ff;
      --accent-dim: #3d3875;
      --accent-glow: rgba(108,99,255,0.25);
      --amber: #f59e0b;
      --amber-dim: rgba(245,158,11,0.15);
      --muted: #6b7280;
      --text: #e5e7eb;
      --text-dim: #9ca3af;
      --radius: 16px;
      --radius-sm: 12px;
    }
    :root.light {
      --bg: #f0f2f8; --surface: #ffffff; --surface-2: #eef0f5;
      --border: #d1d5db; --accent: #6c63ff; --accent-glow: rgba(108,99,255,0.15);
      --muted: #6b7280; --text: #111827; --text-dim: #374151;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px;
    }

    .theme-toggle {
      position: fixed; top: 16px; right: 16px;
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px 5px 7px; border-radius: 999px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-dim); cursor: pointer;
      font-size: 0.72rem; font-weight: 600;
      transition: all 0.2s; z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--text); }
    .theme-toggle:active { transform: scale(0.93); }

    .card {
      width: 100%; max-width: 420px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px 32px 36px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35);
      text-align: center;
    }

    .card-logo { font-size: 2.6rem; margin-bottom: 10px; }
    .card-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .card-sub { font-size: 0.82rem; color: var(--muted); margin-top: 6px; margin-bottom: 36px; }

    .role-grid {
      display: flex; gap: 14px;
    }

    .role-card {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px;
      padding: 28px 12px 24px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      background: var(--surface-2);
      cursor: pointer;
      text-decoration: none;
      color: var(--text-dim);
      transition: all 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    .role-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
    }

    .role-card.teacher:hover,
    .role-card.teacher:focus {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: #fff;
    }

    .role-card.admin:hover,
    .role-card.admin:focus {
      border-color: var(--amber);
      background: var(--amber-dim);
      color: var(--amber);
    }

    .role-card:active { transform: scale(0.97); }

    .role-card.stats:hover,
    .role-card.stats:focus {
      border-color: var(--amber);
      background: var(--amber-dim);
      color: var(--amber);
    }

    .role-icon { font-size: 2.2rem; }

    .role-label {
      font-size: 0.85rem; font-weight: 700;
      line-height: 1.3;
    }

    .divider { height: 1px; background: var(--border); margin: 28px 0 20px; }

    .card-footer {
      font-size: 0.72rem; color: var(--muted);
    }
    .card-footer a {
      color: var(--muted); text-decoration: none; font-weight: 600;
    }
    .card-footer a:hover { color: var(--accent); }
  </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">
  <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="#facc15" stroke="#facc15" stroke-width="1" stroke-linejoin="round"/>
  </svg>
  <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
    <circle cx="12" cy="12" r="5" fill="#fde68a" stroke="#f59e0b"/>
    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
  <span id="theme-label">Dark</span>
</button>

<div class="card">
  <div class="card-logo">📋</div>
  <div class="card-title">VBS 2026</div>
  <div class="card-sub">Select your role to continue</div>

  <div class="role-grid">
    <a class="role-card teacher" href="teachers.html">
      <span class="role-icon">🧑‍🏫</span>
      <span class="role-label">Login as<br>Teacher</span>
    </a>
    <a class="role-card admin" href="admin.html">
      <span class="role-icon">🔐</span>
      <span class="role-label">Login as<br>Admin</span>
    </a>
  </div>

  <div class="divider"></div>
  <div class="card-footer">
    <a class="role-card stats" href="stats.html" style="
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; padding: 18px 12px 16px;
      border-radius: var(--radius-sm); border: 2px solid var(--border);
      background: var(--surface-2); cursor: pointer; text-decoration: none;
      color: var(--text-dim); transition: all 0.18s; width: 100%;
      font-size: 0.82rem; font-weight: 700;
    ">
      <span style="font-size: 1.6rem;">📊</span>
      <span>View Attendance Count</span>
    </a>
  </div>
</div>

<script>
// Theme logic is in theme.js
</script>
</body>
</html>
