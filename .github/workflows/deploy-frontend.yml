name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from template
        # Reads config.template.js and replaces __PLACEHOLDER__ values
        # with GitHub Actions Repository Variables (Settings > Variables > Actions)
        run: |
          sed \
            -e "s|LAMBDA_GET_ATTENDANCE|${{ secrets.LAMBDA_GET_ATTENDANCE }}|g" \
            -e "s|LAMBDA_MARK_ATTENDANCE|${{ secrets.LAMBDA_MARK_ATTENDANCE }}|g" \
            -e "s|LAMBDA_LOGIN|${{ secrets.LAMBDA_LOGIN }}|g" \
            -e "s|LAMBDA_VERIFY|${{ secrets.LAMBDA_VERIFY }}|g" \
            config.template.js > config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

