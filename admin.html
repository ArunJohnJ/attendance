<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="config.js"></script>
  <script src="theme.js"></script>
  <script src="auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <title>VBS 2026 — Admin Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f11; --surface: #16181c; --surface-2: #1e2128;
      --border: #2a2d35; --accent: #6c63ff; --accent-glow: rgba(108,99,255,0.25);
      --green: #22c55e; --red: #ef4444;
      --amber: #f59e0b; --amber-bg: #451a03;
      --muted: #6b7280; --text: #e5e7eb; --text-dim: #9ca3af;
      --radius: 16px; --radius-sm: 10px;
    }
    :root.light {
      --bg: #f0f2f8; --surface: #ffffff; --surface-2: #eef0f5;
      --border: #d1d5db; --accent: #6c63ff; --accent-glow: rgba(108,99,255,0.15);
      --green: #16a34a; --red: #dc2626; --amber: #d97706; --amber-bg: #fef3c7;
      --muted: #6b7280; --text: #111827; --text-dim: #374151;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px;
    }

    .theme-toggle {
      position: fixed; top: 16px; right: 16px;
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px 5px 7px; border-radius: 999px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-dim); cursor: pointer;
      font-size: 0.72rem; font-weight: 600; transition: all 0.2s; z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--text); }
    .theme-toggle:active { transform: scale(0.93); }

    .back-link {
      position: fixed; top: 16px; left: 16px;
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px 5px 8px; border-radius: 999px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-dim); font-size: 0.75rem; font-weight: 600;
      text-decoration: none; transition: all 0.15s; z-index: 10;
    }
    .back-link:hover { border-color: var(--accent); color: var(--text); }

    .login-card {
      width: 100%; max-width: 400px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px 28px 36px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35); text-align: center;
    }
    .card-logo { font-size: 2.2rem; margin-bottom: 6px; }
    .card-title { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.03em; }
    .card-sub { font-size: 0.8rem; color: var(--muted); margin-top: 4px; margin-bottom: 6px; }

    .admin-badge {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--amber-bg); border: 1px solid var(--amber);
      color: var(--amber); border-radius: var(--radius-sm);
      padding: 6px 14px; font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      margin: 0 auto 28px;
    }

    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 13px 20px;
      border-radius: var(--radius-sm); border: 1.5px solid var(--border);
      background: var(--surface-2); color: var(--text);
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .btn-google:hover { border-color: var(--amber); background: var(--amber-bg); color: var(--amber); }
    .btn-google:active { transform: scale(0.97); }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .err-msg { color: var(--red); font-size: 0.75rem; font-weight: 600; margin-top: 16px; min-height: 18px; }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 20px; border-radius: 999px;
      font-size: 0.82rem; font-weight: 600; opacity: 0;
      transition: all 0.25s ease; pointer-events: none; white-space: nowrap; z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<a class="back-link" href="index.html">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
  Back
</a>

<button class="theme-toggle" onclick="toggleTheme()">
  <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="#facc15" stroke="#facc15" stroke-width="1" stroke-linejoin="round"/>
  </svg>
  <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
    <circle cx="12" cy="12" r="5" fill="#fde68a" stroke="#f59e0b"/>
    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
  <span id="theme-label">Dark</span>
</button>

<div class="login-card">
  <div class="card-logo">🛡️</div>
  <div class="card-title">VBS 2026 Admin</div>
  <div class="card-sub">Sign in with your authorized Google account</div>
  <div class="admin-badge">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    Restricted Access
  </div>

  <button class="btn-google" id="google-btn" onclick="login()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.8 6C12.4 13 17.8 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
      <path fill="#FBBC05" d="M10.5 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.8-6z"/>
      <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.9l-7.8 6C6.6 42.6 14.6 48 24 48z"/>
    </svg>
    Sign in with Google
  </button>

  <div class="err-msg" id="err-msg"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  if (getToken()) {
    // Restore sessionStorage from the JWT so the dashboard has role & email
    if (!sessionStorage.getItem('adminAuthenticated')) {
      const _role  = getRoleFromToken()  || 'ADMIN';
      const _email = getEmailFromToken() || '';
      sessionStorage.setItem('adminAuthenticated', '1');
      sessionStorage.setItem('adminRole',  _role);
      sessionStorage.setItem('adminEmail', _email);
    }
    location.replace('admin-dashboard.html');
  }

  const GOOGLE_ICON_SVG = `<svg width="18" height="18" viewBox="0 0 48 48">
    <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.8 6C12.4 13 17.8 9.5 24 9.5z"/>
    <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
    <path fill="#FBBC05" d="M10.5 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.8-6z"/>
    <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.9l-7.8 6C6.6 42.6 14.6 48 24 48z"/>
  </svg> Sign in with Google`;

  function login() {
    const btn = document.getElementById('google-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    setError('');

    const client = google.accounts.oauth2.initCodeClient({
      client_id: APP_CONFIG.GOOGLE_CLIENT_NAME,
      scope: 'openid email',
      ux_mode: 'popup',
      callback: (response) => {
        if (!response.code) {
          setError('Google sign-in was cancelled or failed.');
          resetBtn(); return;
        }
        showToast('🔄 Verifying…');
        fetch(APP_CONFIG.LAMBDA_URLS.LOGIN, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: response.code })
        })
        .then(res => {
          if (res.status === 401) {
            clearSession();
            return res.json().then(d => { throw new Error(d.message || 'Session expired. Please log in again.'); });
          }
          if (!res.ok) return res.json().then(d => { throw new Error(d.message || 'Login failed'); });
          return res.json();
        })
        .then(data => {
          const role = data.role;
          if (role === 'ADMIN' || role === 'SUPER-ADMIN') {
            saveSession(data.token);
            sessionStorage.setItem('adminAuthenticated', '1');
            sessionStorage.setItem('adminRole', role);
            sessionStorage.setItem('adminEmail', data.email || '');
            showToast('✅ Logged in! Entering Dashboard…');
            setTimeout(() => location.href = 'admin-dashboard.html', 600);
          } else {
            setError('Access denied. This account is not authorized for admin access.');
            resetBtn();
          }
        })
        .catch(err => {
          setError(err.message || 'Login failed. Please try again.');
          resetBtn();
        });
      }
    });

    client.requestCode();
  }

  function resetBtn() {
    const btn = document.getElementById('google-btn');
    btn.disabled = false;
    btn.innerHTML = GOOGLE_ICON_SVG;
  }

  function logout() {
    clearSession();
    location.href = 'index.html';
  }

  function setError(msg) { document.getElementById('err-msg').textContent = msg; }

</script>
</body>
</html>
