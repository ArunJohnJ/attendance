<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="config.js"></script>
  <title>Attendance Tracker</title>
  <link rel="stylesheet" href="https://oat.ink/components/oat.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f11;
      --surface: #16181c;
      --surface-2: #1e2128;
      --border: #2a2d35;
      --accent: #6c63ff;
      --accent-dim: #3d3875;
      --green: #22c55e;
      --green-bg: #14532d;
      --red: #ef4444;
      --muted: #6b7280;
      --text: #e5e7eb;
      --text-dim: #9ca3af;
      --radius: 12px;
      --radius-sm: 8px;
    }

    :root.light {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --surface-2: #eef0f5;
      --border: #d1d5db;
      --accent: #6c63ff;
      --accent-dim: #e0deff;
      --green: #16a34a;
      --green-bg: #dcfce7;
      --red: #dc2626;
      --muted: #6b7280;
      --text: #111827;
      --text-dim: #374151;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────── */
    .app-shell {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 100px;
    }
    @media (min-width: 768px) { .app-shell { max-width: 720px; } }

    /* ── Top Bar ────────────────────────────────── */
    .top-bar {
      position: sticky; top: 0; z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .top-bar-center { flex: 1; }
    .top-bar-title { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em; }
    .top-bar-sub { font-size: 0.73rem; color: var(--muted); margin-top: 1px; }

    /* icon buttons */
    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .icon-btn:hover { border-color: var(--accent); }
    .icon-btn:active { transform: scale(0.9); }

    /* theme pill */
    .theme-toggle {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px 5px 7px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.72rem; font-weight: 600;
      transition: all 0.2s ease;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--text); }
    .theme-toggle:active { transform: scale(0.93); }
    .theme-toggle svg { flex-shrink: 0; transition: transform 0.35s ease; }
    .theme-toggle:active svg { transform: rotate(30deg); }

    /* logout btn */
    .logout-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.72rem; font-weight: 600;
      transition: all 0.2s ease;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }
    .logout-btn:active { transform: scale(0.93); }

    /* ── Hamburger / Drawer ─────────────────────── */
    .drawer-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 300;
    }
    .drawer-overlay.open { display: block; }

    .drawer {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 310;
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column;
      padding: 0;
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .drawer-title { font-size: 0.95rem; font-weight: 700; }

    .drawer-close {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-dim);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: all 0.15s;
    }
    .drawer-close:hover { border-color: var(--red); color: var(--red); }

    .drawer-body { padding: 20px 16px; flex: 1; }

    .drawer-section-label {
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.08em; color: var(--muted);
      text-transform: uppercase; margin-bottom: 10px;
    }

    .drawer-btn {
      width: 100%;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem; font-weight: 600;
      transition: all 0.15s;
      margin-bottom: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .drawer-btn:hover { border-color: var(--accent); background: var(--surface); }
    .drawer-btn:active { transform: scale(0.97); }
    .drawer-btn svg { flex-shrink: 0; }

    .drawer-note {
      font-size: 0.7rem; color: var(--muted);
      margin-top: 16px; line-height: 1.5;
    }

    /* ── Class Header ───────────────────────────── */
    .class-header {
      padding: 14px 20px 8px;
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
    }
    .class-title { font-size: 1rem; font-weight: 700; color: var(--text); }
    .class-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    /* ── Modal ──────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 200;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 480px; padding: 20px 20px 32px;
    }
    @media (min-width: 768px) { .modal-sheet { max-width: 720px; } }
    .modal-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; }
    .modal-input {
      width: 100%; background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      padding: 11px 14px; font-size: 0.9rem; outline: none; margin-bottom: 12px;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; }

    /* ── Date Strip ─────────────────────────────── */
    .date-strip-section { padding: 10px 20px 6px; }
    .section-label {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
      color: var(--muted); text-transform: uppercase; margin-bottom: 10px;
    }
    .date-strip { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
    @media (max-width: 360px) { .date-strip { gap: 4px; } }
    .date-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
    .date-cell .day-label { font-size: 0.58rem; color: var(--muted); text-transform: uppercase; font-weight: 600; }
    .date-cell .day-num {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--surface); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 600;
      transition: all 0.15s ease; color: var(--text-dim);
    }
    @media (min-width: 400px) { .date-cell .day-num { width: 32px; height: 32px; font-size: 0.8rem; } }
    .date-cell.active .day-num { background: var(--accent); border-color: var(--accent); color: #fff; }
    .date-cell.today .day-num { border-color: var(--accent); color: var(--text); }

    /* ── Summary Bar ────────────────────────────── */
    .summary-bar {
      margin: 14px 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .summary-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
    .summary-stat .num { font-size: 1.4rem; font-weight: 700; line-height: 1; }
    .summary-stat .lbl { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .summary-stat.present .num { color: var(--green); }
    .summary-stat.absent  .num { color: var(--red); }
    .summary-stat.total   .num { color: var(--text); }
    .divider-v { width: 1px; height: 32px; background: var(--border); }

    /* ── Progress Bar ───────────────────────────── */
    .progress-wrap { margin: 0 20px 14px; height: 6px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 999px;
      transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ── Student List ───────────────────────────── */
    .students-section { padding: 0 20px; }
    .students-section .section-label { margin-bottom: 12px; }
    .student-grid { display: flex; flex-direction: column; gap: 8px; }
    .student-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      display: flex; align-items: center; gap: 12px; transition: border-color 0.15s;
    }
    .student-row.is-present { border-color: #22c55e55; }
    .student-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent-dim); display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; color: #c4bfff; flex-shrink: 0;
    }
    .student-info { flex: 1; min-width: 0; }
    .student-name { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .student-status-text { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
    .student-row.is-present .student-status-text { color: var(--green); }
    .habit-dots { display: flex; gap: 4px; align-items: center; }
    .habit-dot {
      width: 9px; height: 9px; border-radius: 3px;
      background: var(--surface-2); border: 1px solid var(--border);
      transition: all 0.12s ease; cursor: pointer;
    }
    .habit-dot.filled { background: var(--green); border-color: var(--green); }
    .habit-dot.today-dot {
      border-color: var(--accent);
      border-width: 2px;
      width: 11px; height: 11px;
      box-shadow: 0 0 0 2px rgba(108,99,255,0.25);
      border-radius: 4px;
    }
    .habit-dot.today-dot.filled {
      background: var(--green);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(108,99,255,0.25);
    }

    /* ── Toggle Checkbox ────────────────────────── */
    .present-toggle {
      width: 42px; height: 42px; border-radius: var(--radius-sm);
      border: 2px solid var(--border); background: var(--surface-2);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .present-toggle:active { transform: scale(0.88); }
    .present-toggle .check-icon {
      opacity: 0; transform: scale(0.5);
      transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1); font-size: 1.1rem;
    }
    .present-toggle.checked { background: var(--green); border-color: var(--green); box-shadow: 0 0 0 4px rgba(34,197,94,0.15); }
    .present-toggle.checked .check-icon { opacity: 1; transform: scale(1); }

    /* ── Delete / Edit student buttons ─────────── */
    .delete-btn, .edit-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .delete-btn:hover { border-color: var(--red); color: var(--red); background: #450a0a; }
    .delete-btn:active { transform: scale(0.88); }
    .edit-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .edit-btn:active { transform: scale(0.88); }

    /* ── Buttons ────────────────────────────────── */
    .mark-all-row { display: flex; gap: 8px; margin: 0 20px 14px; }
    .btn {
      flex: 1; padding: 10px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.12s; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); }
    .btn.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.btn-success { background: var(--green-bg); border-color: var(--green); color: var(--green); }
    .btn.btn-danger  { background: #450a0a; border-color: var(--red); color: var(--red); }

    /* ── Submit Bar ─────────────────────────────── */
    .submit-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 20px; background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; max-width: 480px; margin: 0 auto;
    }
    @media (min-width: 768px) { .submit-bar { max-width: 720px; } }
    .submit-btn {
      flex: 1; padding: 14px; border-radius: var(--radius); border: none;
      background: var(--accent); color: #fff;
      font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .submit-btn:active { transform: scale(0.97); opacity: 0.9; }

    /* ── Toast ──────────────────────────────────── */
    .toast {
      position: fixed; top: 70px; left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 20px; border-radius: var(--radius);
      font-size: 0.82rem; font-weight: 600; opacity: 0;
      transition: all 0.25s ease; pointer-events: none; white-space: nowrap; z-index: 400;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Hidden export table ────────────────────── */
    #attendance-export-table { display: none; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- ── Top Bar ──────────────────────────────── -->
  <div class="top-bar">
    <!-- Hamburger -->
    <button class="icon-btn" onclick="openDrawer()" title="Reports" aria-label="Open reports">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- Title -->
    <div class="top-bar-center">
      <div class="top-bar-title">📋 Attendance</div>
      <div class="top-bar-sub" id="current-date-label">May 3, 2026</div>
    </div>

    <!-- Theme toggle -->
    <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme">
      <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="#facc15" stroke="#facc15" stroke-width="1" stroke-linejoin="round"/>
      </svg>
      <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <circle cx="12" cy="12" r="5" fill="#fde68a" stroke="#f59e0b"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <span id="theme-toggle-label">Dark</span>
    </button>

    <!-- Logout -->
    <button class="logout-btn" onclick="logout()" title="Logout">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>

  <!-- ── Class Header ──────────────────────────── -->
  <div class="class-header">
    <div>
      <div class="class-title">📚 Grade 5 — Ms. Smith</div>
      <div class="class-sub" id="class-student-count">10 students</div>
    </div>
    <button class="btn btn-primary" style="flex:none;padding:8px 14px;font-size:0.8rem" onclick="openAddStudent()">＋ Add Student</button>
  </div>

  <!-- ── Date Strip ────────────────────────────── -->
  <div class="date-strip-section">
    <div class="section-label">Apr 25 – May 3</div>
    <div class="date-strip" id="date-strip"></div>
  </div>

  <!-- ── Summary Bar ───────────────────────────── -->
  <div class="summary-bar">
    <div class="summary-stat present"><span class="num" id="present-count">0</span><span class="lbl">Present</span></div>
    <div class="divider-v"></div>
    <div class="summary-stat absent"><span class="num" id="absent-count">0</span><span class="lbl">Absent</span></div>
    <div class="divider-v"></div>
    <div class="summary-stat total"><span class="num" id="total-count">0</span><span class="lbl">Total</span></div>
  </div>

  <!-- ── Progress Bar ──────────────────────────── -->
  <div class="progress-wrap">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <!-- ── Mark All ──────────────────────────────── -->
  <div class="mark-all-row">
    <button class="btn btn-success" onclick="markAll(true)">✅ Mark All Present</button>
    <button class="btn btn-danger"  onclick="markAll(false)">❌ Mark All Absent</button>
  </div>

  <!-- ── Student List ──────────────────────────── -->
  <div class="students-section">
    <div class="section-label" id="students-label">Students — May 3</div>
    <div class="student-grid" id="student-list"></div>
  </div>

</div><!-- /.app-shell -->

<!-- ── Reports Drawer ────────────────────────── -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="reports-drawer">
  <div class="drawer-header">
    <span class="drawer-title">📊 Reports</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body">
    <div class="drawer-section-label">Export Attendance</div>

    <button class="drawer-btn" onclick="exportExcel()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/>
        <line x1="10" y1="9" x2="8" y2="9"/>
      </svg>
      Export as Excel (.xlsx)
    </button>

    <button class="drawer-btn" onclick="exportPDF()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/>
      </svg>
      Export as PDF
    </button>

    <p class="drawer-note">Exports include all students and all dates currently loaded in the session.</p>
  </div>
</div>

<!-- ── Add Student Modal ──────────────────────── -->
<div class="modal-overlay" id="add-student-modal" onclick="handleModalOverlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-title">➕ Add New Student</div>
    <input class="modal-input" id="new-student-name" type="text" placeholder="Full name (e.g. Jane Doe)"
           maxlength="40" onkeydown="if(event.key==='Enter')confirmAddStudent()" />
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="confirmAddStudent()">Add Student</button>
      <button class="btn" onclick="closeAddStudent()">Cancel</button>
    </div>
  </div>
</div>

<!-- ── Edit Student Modal ─────────────────────── -->
<div class="modal-overlay" id="edit-student-modal" onclick="handleEditModalOverlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-title">✏️ Edit Student Name</div>
    <input class="modal-input" id="edit-student-name" type="text" placeholder="Full name"
           maxlength="40" onkeydown="if(event.key==='Enter')confirmEditStudent()" />
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="confirmEditStudent()">Save</button>
      <button class="btn" onclick="closeEditStudent()">Cancel</button>
    </div>
  </div>
</div>

<!-- ── Submit Bar ────────────────────────────── -->
<div class="submit-bar">
  <button class="submit-btn" onclick="submitAttendance()">✔ Submit Attendance</button>
</div>

<!-- ── Toast ─────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- Hidden table used for export -->
<table id="attendance-export-table"></table>

<!-- CDN Libraries -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script>
// ── Auth guard ────────────────────────────────────
if (!sessionStorage.getItem('authenticated')) {
  location.replace('index.html');
}

// ── Data ──────────────────────────────────────────
const CLASS = {
  name: "Grade 5 — Ms. Smith",
  students: [
    "Alice Johnson","Bob Smith","Charlie Brown","Diana Prince",
    "Ethan Hunt","Fiona Green","George Miller","Hannah White",
    "Ivan Torres","Julia Roberts"
  ]
};
const activeClass = 'grade5';

const TODAY_START = new Date(2026, 3, 25);
const RANGE_END   = new Date(2026, 4, 3);
const DAYS = [];
for (let d = new Date(TODAY_START); d <= RANGE_END; d.setDate(d.getDate() + 1)) {
  DAYS.push(new Date(d));
}

// Find today in range; fallback to last day if today is outside range
const _todayNorm = new Date(); _todayNorm.setHours(0,0,0,0);
const _todayIdx  = DAYS.findIndex(d => d.getTime() === _todayNorm.getTime());
const TODAY_IDX  = _todayIdx !== -1 ? _todayIdx : DAYS.length - 1;

const attendance = {};
let activeDay = TODAY_IDX;

// ── Theme ─────────────────────────────────────────
function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  document.getElementById('icon-moon').style.display = isLight ? 'none' : '';
  document.getElementById('icon-sun').style.display  = isLight ? '' : 'none';
  document.getElementById('theme-toggle-label').textContent = isLight ? 'Light' : 'Dark';
}

// ── Logout ────────────────────────────────────────
function logout() {
  sessionStorage.removeItem('authenticated');
  location.href = 'index.html';
}

// ── Drawer ────────────────────────────────────────
function openDrawer() {
  document.getElementById('reports-drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('reports-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ── Init ──────────────────────────────────────────
function init() {
  buildDateStrip();
  seedHistoricData();
  renderStudentList();
  updateDateLabel();
  updateStudentCount();
}

function seedHistoricData() {
  if (!attendance[activeClass]) {
    attendance[activeClass] = {};
    DAYS.forEach((d, idx) => {
      if (idx < TODAY_IDX) {
        const key = dateKey(d);
        attendance[activeClass][key] = {};
        CLASS.students.forEach(s => {
          attendance[activeClass][key][s] = Math.random() > 0.15;
        });
      }
    });
  }
}

function updateStudentCount() {
  const el = document.getElementById('class-student-count');
  if (el) el.textContent = `${CLASS.students.length} student${CLASS.students.length !== 1 ? 's' : ''}`;
}

// ── Date Strip ────────────────────────────────────
const DAY_LABELS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const MONTH_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function buildDateStrip() {
  const strip = document.getElementById('date-strip');
  strip.innerHTML = '';
  DAYS.forEach((d, idx) => {
    const cell = document.createElement('div');
    cell.className = 'date-cell' + (idx === TODAY_IDX ? ' today' : '') + (idx === activeDay ? ' active' : '');
    cell.innerHTML = `<span class="day-label">${DAY_LABELS[d.getDay()]}</span><div class="day-num">${d.getDate()}</div>`;
    cell.addEventListener('click', () => selectDay(idx));
    strip.appendChild(cell);
  });
}

function selectDay(idx) {
  activeDay = idx;
  document.querySelectorAll('.date-cell').forEach((c, i) => c.classList.toggle('active', i === idx));
  updateDateLabel();
  renderStudentList();
}

function updateDateLabel() {
  const d = DAYS[activeDay];
  document.getElementById('current-date-label').textContent = `${MONTH_ABBR[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  document.getElementById('students-label').textContent = `Students — ${MONTH_ABBR[d.getMonth()]} ${d.getDate()}`;
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── Student List ──────────────────────────────────
function renderStudentList() {
  const key    = dateKey(DAYS[activeDay]);
  const dayAtt = (attendance[activeClass] || {})[key] || {};
  const list   = document.getElementById('student-list');
  list.innerHTML = '';

  CLASS.students.forEach(name => {
    const isPresent = !!dayAtt[name];
    const initials  = name.split(' ').map(w => w[0]).join('').slice(0, 2);
    const row = document.createElement('div');
    row.className = 'student-row' + (isPresent ? ' is-present' : '');
    row.id = 'row-' + sanitize(name);

    const dots = DAYS.map((d, idx) => {
      const att = (attendance[activeClass] || {})[dateKey(d)] || {};
      const filled = idx < TODAY_IDX ? !!att[name] : (idx === activeDay ? !!dayAtt[name] : false);
      return `<div class="habit-dot ${filled ? 'filled' : ''} ${idx === activeDay ? 'today-dot' : ''}"
                   title="${DAY_LABELS[d.getDay()]} ${d.getDate()}"
                   onclick="toggleDot('${escHtml(name)}', ${idx})"></div>`;
    }).join('');

    row.innerHTML = `
      <div class="student-avatar">${escHtml(initials)}</div>
      <div class="student-info">
        <div class="student-name">${escHtml(name)}</div>
        <div class="student-status-text">${isPresent ? '✅ Present' : '—  Not marked'}</div>
        <div class="habit-dots" style="margin-top:5px">${dots}</div>
      </div>
      <div class="present-toggle ${isPresent ? 'checked' : ''}" id="toggle-${sanitize(name)}"
           onclick="toggleStudent('${escHtml(name)}')" role="checkbox" aria-checked="${isPresent}" tabindex="0"
           onkeydown="if(event.key===' '||event.key==='Enter'){toggleStudent('${escHtml(name)}')}">
        <span class="check-icon">✓</span>
      </div>
      <button class="edit-btn" onclick="openEditStudent('${escHtml(name)}')" title="Edit name" aria-label="Edit ${escHtml(name)}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
      <button class="delete-btn" onclick="deleteStudent('${escHtml(name)}')" title="Remove student" aria-label="Remove ${escHtml(name)}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>`;
    list.appendChild(row);
  });
  updateSummary();
}

function toggleStudent(name) {
  const key = dateKey(DAYS[activeDay]);
  if (!attendance[activeClass]) attendance[activeClass] = {};
  if (!attendance[activeClass][key]) attendance[activeClass][key] = {};
  const cur = !!attendance[activeClass][key][name];
  attendance[activeClass][key][name] = !cur;

  const row = document.getElementById('row-' + sanitize(name));
  const toggle = document.getElementById('toggle-' + sanitize(name));
  const statusTxt = row.querySelector('.student-status-text');
  if (!cur) {
    row.classList.add('is-present'); toggle.classList.add('checked');
    toggle.setAttribute('aria-checked', 'true'); statusTxt.textContent = '✅ Present';
  } else {
    row.classList.remove('is-present'); toggle.classList.remove('checked');
    toggle.setAttribute('aria-checked', 'false'); statusTxt.textContent = '—  Not marked';
  }
  row.querySelector('.habit-dot.today-dot')?.classList.toggle('filled', !cur);
  updateSummary();
}

function toggleDot(name, dayIdx) {
  if (dayIdx !== TODAY_IDX) { showToast('Past records are read-only'); return; }
  toggleStudent(name);
}

function markAll(present) {
  const key = dateKey(DAYS[activeDay]);
  if (!attendance[activeClass]) attendance[activeClass] = {};
  if (!attendance[activeClass][key]) attendance[activeClass][key] = {};
  CLASS.students.forEach(s => { attendance[activeClass][key][s] = present; });
  renderStudentList();
}

function updateSummary() {
  const key    = dateKey(DAYS[activeDay]);
  const dayAtt = (attendance[activeClass] || {})[key] || {};
  const total   = CLASS.students.length;
  const present = CLASS.students.filter(s => !!dayAtt[s]).length;
  document.getElementById('present-count').textContent = present;
  document.getElementById('absent-count').textContent  = total - present;
  document.getElementById('total-count').textContent   = total;
  document.getElementById('progress-fill').style.width = `${Math.round((present / total) * 100)}%`;
}

function submitAttendance() {
  const key    = dateKey(DAYS[activeDay]);
  const dayAtt = (attendance[activeClass] || {})[key] || {};
  const total   = CLASS.students.length;
  const present = CLASS.students.filter(s => !!dayAtt[s]).length;
  const payload = { classId: activeClass, date: key, records: dayAtt, submittedAt: new Date().toISOString() };
  console.log('Payload:', JSON.stringify(payload, null, 2));
  showToast(`✅ Submitted! ${present}/${total} present`);
}

// ── Add Student ───────────────────────────────────
function openAddStudent() {
  document.getElementById('new-student-name').value = '';
  document.getElementById('add-student-modal').classList.add('open');
  setTimeout(() => document.getElementById('new-student-name').focus(), 100);
}
function closeAddStudent() { document.getElementById('add-student-modal').classList.remove('open'); }
function handleModalOverlayClick(e) { if (e.target.id === 'add-student-modal') closeAddStudent(); }
function confirmAddStudent() {
  const input = document.getElementById('new-student-name');
  const name  = input.value.trim();
  if (!name) { showToast('⚠️ Please enter a name'); return; }
  if (CLASS.students.includes(name)) { showToast('⚠️ Student already exists'); return; }
  CLASS.students.push(name);
  updateStudentCount();
  renderStudentList();
  closeAddStudent();
  showToast(`✅ Added ${name}`);
}

// ── Delete Student ────────────────────────────────
function deleteStudent(name) {
  if (!confirm(`Remove "${name}" from the class? This cannot be undone.`)) return;
  const idx = CLASS.students.indexOf(name);
  if (idx === -1) return;
  CLASS.students.splice(idx, 1);
  // Remove from all attendance records
  Object.values(attendance[activeClass] || {}).forEach(dayRec => { delete dayRec[name]; });
  updateStudentCount();
  renderStudentList();
  showToast(`🗑️ Removed ${name}`);
}

// ── Edit Student ──────────────────────────────────
let _editingName = '';
function openEditStudent(name) {
  _editingName = name;
  document.getElementById('edit-student-name').value = name;
  document.getElementById('edit-student-modal').classList.add('open');
  setTimeout(() => document.getElementById('edit-student-name').focus(), 100);
}
function closeEditStudent() { document.getElementById('edit-student-modal').classList.remove('open'); }
function handleEditModalOverlayClick(e) { if (e.target.id === 'edit-student-modal') closeEditStudent(); }
function confirmEditStudent() {
  const input   = document.getElementById('edit-student-name');
  const newName = input.value.trim();
  if (!newName) { showToast('⚠️ Please enter a name'); return; }
  if (newName === _editingName) { closeEditStudent(); return; }
  if (CLASS.students.includes(newName)) { showToast('⚠️ Student already exists'); return; }
  const idx = CLASS.students.indexOf(_editingName);
  if (idx === -1) return;
  CLASS.students[idx] = newName;
  // Rename in all attendance records
  Object.values(attendance[activeClass] || {}).forEach(dayRec => {
    if (_editingName in dayRec) {
      dayRec[newName] = dayRec[_editingName];
      delete dayRec[_editingName];
    }
  });
  updateStudentCount();
  renderStudentList();
  closeEditStudent();
  showToast(`✏️ Renamed to ${newName}`);
}

// ── Build export data ─────────────────────────────
function buildExportRows() {
  // Excel version — uses emoji (renders fine in xlsx)
  const headers = ['Student', ...DAYS.map(d => `${MONTH_ABBR[d.getMonth()]} ${d.getDate()}`), 'Total Days Present', ''];
  const rows = CLASS.students.map(name => {
    const dayValues = DAYS.map(d => {
      const att = (attendance[activeClass] || {})[dateKey(d)] || {};
      return att[name] === true ? '✅' : att[name] === false ? '❌' : '';
    });
    const total = dayValues.filter(v => v === '✅').length;
    return [name, ...dayValues, total, ''];
  });
  return { headers, rows };
}

function buildPdfRows() {
  // PDF version — uses ASCII-safe symbols that jsPDF renders correctly
  // P = present (●), A = absent (✕)
  const headers = ['Student', ...DAYS.map(d => `${MONTH_ABBR[d.getMonth()]} ${d.getDate()}`), 'Total'];
  const rows = CLASS.students.map(name => {
    const dayValues = DAYS.map(d => {
      const att = (attendance[activeClass] || {})[dateKey(d)] || {};
      return att[name] === true ? 'P' : att[name] === false ? 'A' : '-';
    });
    const total = dayValues.filter(v => v === 'P').length;
    return [name, ...dayValues, total];
  });
  return { headers, rows };
}

// ── Export Excel ──────────────────────────────────
function exportExcel() {
  try {
    const { headers, rows } = buildExportRows();
    const wsData = [headers, ...rows];
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(wsData);

    const totalColIdx = headers.length - 2; // "Total Days Present"; last col is empty padding

    // Column widths
    ws['!cols'] = [
      { wch: 22 },
      ...DAYS.map(() => ({ wch: 7 })),
      { wch: 18 },
      { wch: 6 }
    ];

    // Style header row (skip last empty padding column)
    headers.forEach((_, ci) => {
      if (ci === headers.length - 1) return; // skip empty padding col
      const cellRef = XLSX.utils.encode_cell({ r: 0, c: ci });
      if (!ws[cellRef]) return;
      ws[cellRef].s = {
        font: { bold: true, color: { rgb: 'FFFFFF' } },
        fill: { fgColor: { rgb: '6C63FF' } },
        alignment: { horizontal: ci === 0 ? 'left' : 'center' }
      };
    });

    // Style data rows
    rows.forEach((row, ri) => {
      row.forEach((val, ci) => {
        const cellRef = XLSX.utils.encode_cell({ r: ri + 1, c: ci });
        if (!ws[cellRef]) return;
        if (val === '✅') {
          ws[cellRef].s = { alignment: { horizontal: 'center' } };
        } else if (val === '❌') {
          ws[cellRef].s = { alignment: { horizontal: 'center' } };
        } else if (ci === totalColIdx) {
          ws[cellRef].s = {
            font: { bold: true },
            fill: { fgColor: { rgb: 'DCFCE7' } },
            alignment: { horizontal: 'center' }
          };
        }
      });
    });

    XLSX.utils.book_append_sheet(wb, ws, 'Attendance');
    XLSX.writeFile(wb, 'attendance_grade5.xlsx');
    closeDrawer();
    showToast('✅ Excel file downloaded');
  } catch (e) {
    showToast('❌ Export failed — check console');
    console.error(e);
  }
}

// ── Export PDF ────────────────────────────────────
function exportPDF() {
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const { headers, rows } = buildPdfRows();
    const totalColIdx = headers.length - 1;

    doc.setFontSize(14);
    doc.text('Attendance Report — Grade 5 / Ms. Smith', 14, 15);
    doc.setFontSize(9);
    doc.setTextColor(120);
    doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 21);

    doc.autoTable({
      head: [headers],
      body: rows,
      startY: 26,
      styles: { fontSize: 8, cellPadding: 2, halign: 'center' },
      headStyles: { fillColor: [108, 99, 255], textColor: 255, fontStyle: 'bold', halign: 'center' },
      columnStyles: {
        0: { cellWidth: 36, halign: 'left' },
        [totalColIdx]: { cellWidth: 14, fontStyle: 'bold', fillColor: [238, 240, 245] }
      },
      didParseCell: (data) => {
        if (data.section === 'body' && data.column.index > 0 && data.column.index < totalColIdx) {
          if (data.cell.raw === 'P') {
            data.cell.styles.fillColor  = [220, 252, 231]; // light green bg
            data.cell.styles.textColor  = [21, 128, 61];   // dark green text
            data.cell.styles.fontStyle  = 'bold';
          } else if (data.cell.raw === 'A') {
            data.cell.styles.fillColor  = [254, 226, 226]; // light red bg
            data.cell.styles.textColor  = [185, 28, 28];   // dark red text
            data.cell.styles.fontStyle  = 'bold';
          } else if (data.cell.raw === '-') {
            data.cell.styles.textColor  = [180, 180, 180];
          }
        }
      }
    });

    doc.save('attendance_grade5.pdf');
    closeDrawer();
    showToast('✅ PDF file downloaded');
  } catch (e) {
    showToast('❌ Export failed — check console');
    console.error(e);
  }
}

// ── Toast ─────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Helpers ───────────────────────────────────────
function sanitize(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }
function escHtml(s)  { return s.replace(/'/g, "&#39;").replace(/"/g, '&quot;'); }

init();
</script>
