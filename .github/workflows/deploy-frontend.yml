name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from template
        # Reads config-template.js and replaces __PLACEHOLDER__ values
        # with GitHub Actions Repository Variables (Settings > Variables > Actions)
        run: |
          sed \
            -e "s|GOOGLE_CLIENT_ID|${{ secrets.GOOGLE_CLIENT_ID }}|g" \
            -e "s|LAMBDA_GET_ATTENDANCE|${{ secrets.LAMBDA_GET_ATTENDANCE }}|g" \
            -e "s|LAMBDA_GET_TEACHERS|${{ secrets.LAMBDA_GET_TEACHERS }}|g" \
            -e "s|LAMBDA_MARK_ATTENDANCE|${{ secrets.LAMBDA_MARK_ATTENDANCE }}|g" \
            -e "s|LAMBDA_LOGIN|${{ secrets.LAMBDA_LOGIN }}|g" \
            -e "s|LAMBDA_SUMMARY|${{ secrets.LAMBDA_SUMMARY }}|g" \
            -e "s|LAMBDA_DISTINCT_CLASSES|${{ secrets.LAMBDA_DISTINCT_CLASSES }}|g" \
            -e "s|LAMBDA_VIEW_STUDENTS_SPECIFIC_DATE|${{ secrets.LAMBDA_VIEW_STUDENTS_SPECIFIC_DATE }}|g" \
            -e "s|LAMBDA_VIEW_STUDENTS_ALL_DATES|${{ secrets.LAMBDA_VIEW_STUDENTS_ALL_DATES }}|g" \
            -e "s|LAMBDA_GET_USERS|${{ secrets.LAMBDA_GET_USERS }}|g" \
            -e "s|LAMBDA_DELETE_USER|${{ secrets.LAMBDA_DELETE_USER }}|g" \
            -e "s|LAMBDA_EDIT_USER|${{ secrets.LAMBDA_EDIT_USER }}|g" \
            -e "s|LAMBDA_ADD_USER|${{ secrets.LAMBDA_ADD_USER }}|g" \
            -e "s|LAMBDA_ADD_STUDENT|${{ secrets.LAMBDA_ADD_STUDENT }}|g" \
            -e "s|LAMBDA_EDIT_STUDENT|${{ secrets.LAMBDA_EDIT_STUDENT }}|g" \
            config-template.js > config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

